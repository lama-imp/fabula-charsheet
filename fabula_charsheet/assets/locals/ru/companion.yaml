npc_skill_crisis_effect: "Кризисный эффект"
npc_skill_crisis_effect_description: >
  Пока спутник находится в Кризисе, он получает особое преимущество или способность (описано ниже).
npc_skill_damage_absorption: "Поглощение урона"
npc_skill_damage_absorption_description: >
  Спутник получает Поглощение к типу урона, к которому у него уже есть Сопротивление или Иммунитет.
npc_skill_damage_immunity: "Иммунитет к урону"
npc_skill_damage_immunity_description: >
  Спутник получает Иммунитет к одному типу урона, к которому у него не было Уязвимости.
npc_skill_damage_resistance: "Сопротивление урону"
npc_skill_damage_resistance_description: >
  Спутник получает Сопротивление к двум типам урона.
npc_skill_final_act: "Последний акт (Ограниченный)"
npc_skill_final_act_description: >
  При падении до 0 ОЗ спутник может немедленно совершить особое действие или атаку (описано ниже).
npc_skill_flying: "Полёт (Ограниченный)"
npc_skill_flying_description: >
  Спутник может летать или левитировать. Его атаки ближнего боя могут поражать летающих существ, и он не может
  быть целью атак ближнего боя, если атакующий не может дотянуться до летающих целей. Если он получает урон типа,
  к которому уязвим, он вынужден приземлиться до конца раунда. Находясь в Кризисе, он теряет преимущества этого навыка.
npc_skill_improved_damage: "Улучшенный урон"
npc_skill_improved_damage_description: >
  Одна из базовых атак спутника наносит на 5 больше урона.
npc_skill_improved_defenses: "Улучшенная защита"
npc_skill_improved_defenses_description: >
  Спутник получает либо +2 к Защите и +1 к Маг. защите, либо +1 к Защите и +2 к Маг. защите.
npc_skill_improved_hit_points: "Улучшенные очки здоровья"
npc_skill_improved_hit_points_description: >
  Максимальные очки здоровья спутника увеличиваются на 10.
npc_skill_reaction: "Реакция"
npc_skill_reaction_description: >
  Спутник реагирует на определённый триггер, например, промах атаки по нему или попадание вражеского
  заклинания (описано ниже).
npc_skill_special_attack: "Особая атака"
npc_skill_special_attack_description: >
  Одна из атак спутника получает особый эффект (описано ниже).
npc_skill_specialized: "Специализация"
npc_skill_specialized_description: >
  Спутник получает бонус +3 ко всем проверкам Точности, всем проверкам Магии или встречным проверкам
  в определённом контексте.
npc_skill_status_effect_immunity: "Иммунитет к состояниям"
npc_skill_status_effect_immunity_description: >
  Спутник становится невосприимчив к двум состояниям на выбор.
npc_skill_unique_action: "Уникальное действие"
npc_skill_unique_action_description: >
  Спутник может совершить действие Навык, чтобы создать уникальный эффект (описано ниже).
