npc_skill_crisis_effect: "Crisis Effect"
npc_skill_crisis_effect_description: >
  As long as the companion is in Crisis, it gains a special benefit or ability (described below).
npc_skill_damage_absorption: "Damage Absorption"
npc_skill_damage_absorption_description: >
  The companion gains Absorption towards a damage type it is already Resistant or Immune to.
npc_skill_damage_immunity: "Damage Immunity"
npc_skill_damage_immunity_description: >
  The companion gains Immunity to one damage type it was not Vulnerable to.
npc_skill_damage_resistance: "Damage Resistance"
npc_skill_damage_resistance_description: >
  The companion gains Resistance to two damage types.
npc_skill_final_act: "Final Act (Limited)"
npc_skill_final_act_description: >
  When reduced to 0 HP, the companion can immediately perform a special action or attack (described below).
npc_skill_flying: "Flying (Limited)"
npc_skill_flying_description: >
  The companion can fly or levitate. Its melee attacks can target flying creatures, and it cannot be targeted
  by melee attacks unless the attacker can also reach flying targets. If it takes damage of a type it is
  Vulnerable to, it is forced to land until the end of the round. While in Crisis, it loses this Skill's benefits.
npc_skill_improved_damage: "Improved Damage"
npc_skill_improved_damage_description: >
  One of the companion's basic attacks deals 5 extra damage.
npc_skill_improved_defenses: "Improved Defenses"
npc_skill_improved_defenses_description: >
  The companion gains either +2 Defense and +1 Magic Defense, or +1 Defense and +2 Magic Defense.
npc_skill_improved_hit_points: "Improved Hit Points"
npc_skill_improved_hit_points_description: >
  The companion's maximum Hit Points are increased by 10.
npc_skill_reaction: "Reaction"
npc_skill_reaction_description: >
  The companion reacts to a specific trigger, such as being missed by an attack or hit by an offensive spell
  (described below).
npc_skill_special_attack: "Special Attack"
npc_skill_special_attack_description: >
  One of the companion's attacks gains a special effect (described below).
npc_skill_specialized: "Specialized"
npc_skill_specialized_description: >
  The companion gains a +3 bonus to all Accuracy Checks, all Magic Checks, or Opposed Checks in a specific context.
npc_skill_status_effect_immunity: "Status Effect Immunity"
npc_skill_status_effect_immunity_description: >
  The companion becomes immune to two status effects of choice.
npc_skill_unique_action: "Unique Action"
npc_skill_unique_action_description: >
  The companion may perform the Skill action to generate a unique effect (described below).
